<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pump Station</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

<div class="col">
<h3>Mode</h3>
<label><input type="radio" name="mode" checked> Wet</label>
<label><input type="radio" name="mode"> Dry/Wet</label>

<h3>Inputs</h3>
Inflow (L/s)<input id="inflow" value="500">
Duty<input id="duty" value="1">
Standby<input id="standby" value="1">
Total<input id="total" readonly>
Pump/each<input id="pump" readonly>
Starts/hr<input id="starts" value="6">
</div>

<div class="col">
<h3>Levels</h3>
Pump axis<input id="axis" value="0.8">
Pipe dia (mm)<input id="pipe" value="400">
Invert<input id="invert" value="2.5">
Freeboard<input id="free" value="0.3">
Eff depth<input id="eff" value="1.5">

<button onclick="calc()">Calculate</button>

<div id="out"></div>
</div>

<div class="col">
<h3>Shape</h3>
<label><input type="radio" name="shape" checked> Circular</label>
<label><input type="radio" name="shape"> Rectangular</label>

<svg id="svg" viewBox="0 0 300 300"></svg>
</div>

</div>

<script src="js/app.js"></script>
</body>
</html>
